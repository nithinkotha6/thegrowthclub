name: WhatsApp Daily Digest

# NOTE: the automatic `schedule` trigger is intentionally disabled — the
# product decision (see Findings_and_Recommendations.md "Cron consolidation")
# was to keep only ONE daily broadcast (daily-whistle, scheduled in
# vercel.json). This route is kept dormant-but-present; re-enable the
# schedule below only if that decision is deliberately reversed.
on:
  # ALLOWS MANUAL CLICKING IN GITHUB UI ONLY:
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger WhatsApp Digest API Endpoint
        run: |
          curl -X POST ${{ secrets.APP_BASE_URL }}/api/cron/whatsapp-digest \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --show-error --silent
